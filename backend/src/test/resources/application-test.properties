# Baza H2
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Flyway wyłączone — schematem zarządza Hibernate
spring.flyway.enabled=false

# WAŻNE: te same nazwy co w reszcie aplikacji!
jwt.secret=super-tajny-klucz-jwt-do-testow-o-odpowiedniej-dlugosci-min32
jwt.expiration-time=3600000

# API keys
tmdb.api.key=test-tmdb-api-key
tmdb.api.base-url=https://api.themoviedb.org/3
gemini.api.key=test-gemini-api-key
openai.api.key=test-openai-api-key