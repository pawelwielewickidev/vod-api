# Konfiguracja bazy danych H2 w pamięci na potrzeby testów
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Hibernate DDL-Auto - utwórz schemat przy starcie, usuń po zakończeniu testów
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Wyłączenie Flyway dla testów, ponieważ schematem zarządza Hibernate
spring.flyway.enabled=false

# Zhardkodowane wartości dla sekretów i kluczy API
security.jwt.secret-key=super-tajny-klucz-jwt-do-testow-o-odpowiedniej-dlugosci
security.jwt.expiration-time=3600000 # 1 godzina

TMDB.api.key=test-tmdb-api-key
tmdb.api.base-url=https://api.themoviedb.org/3
gemini.api.key=test-gemini-api-key
openai.api.key=test-openai-api-key
