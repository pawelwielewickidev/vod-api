# Wspólne ustawienia aplikacji
spring.application.name=vod-api
tmdb.api.base-url=https://api.themoviedb.org/3
server.port=${PORT:8080}

# Konfiguracja JPA/Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.validate-on-migrate=true

# Nie mieszamy schema.sql/data.sql ze schematem zarządzanym przez Flyway
spring.sql.init.mode=never

# Diagnostyka Flyway
logging.level.org.flywaydb=INFO
logging.level.org.springframework.boot.autoconfigure.flyway=DEBUG


# Wyłączenie domyślnego profilu (opcjonalnie, wymusza jawny wybór)
# spring.profiles.active=dev