# Połączenie z Cloud SQL przez Socket Factory
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mock}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:mock-key-for-tests}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:mock-key-for-tests}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate

# Sekrety pobierane ze zmiennych środowiskowych Cloud Run
jwt.secret=${JWT_SECRET:test-secret-key-that-is-long-enough-32chars}
tmdb.api.key=${TMDB_API_KEY:mock-key-for-tests}
openai.api.key=${OPENAI_API_KEY:mock-key-for-tests}

# Produkcyjne ustawienia Hibernate (brak logów SQL dla wydajności)
spring.jpa.show-sql=false