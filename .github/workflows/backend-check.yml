name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: vod_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: ./backend

      - name: Build with Gradle (Includes Tests)
        run: ./gradlew build --no-daemon
        working-directory: ./backend
        env:
          SPRING_PROFILES_ACTIVE: dev
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/vod_db
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: password
          JWT_SECRET: test-secret-key-that-is-long-enough-for-hs256-algorithm
          TMDB_API_KEY: test-key
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: test-key

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker

      - name: Build Docker image
        run: |
          docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/vod-api:${{ github.sha }} ./backend

      - name: Push Docker image
        run: |
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/vod-api:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy vod-api \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/vod-api:${{ github.sha }} \
            --region europe-central2 \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars="SPRING_PROFILES_ACTIVE=prod" \
            --set-env-vars="SPRING_DATASOURCE_URL=${{ secrets.PROD_DB_URL }}" \
            --set-env-vars="SPRING_DATASOURCE_USERNAME=${{ secrets.PROD_DB_USERNAME }}" \
            --set-env-vars="SPRING_DATASOURCE_PASSWORD=${{ secrets.PROD_DB_PASSWORD }}" \
            --set-env-vars="JWT_SECRET=${{ secrets.JWT_SECRET }}" \
            --set-env-vars="TMDB_API_KEY=${{ secrets.TMDB_API_KEY }}" \
            --set-env-vars="OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" \
            --add-cloudsql-instances=${{ secrets.CLOUD_SQL_INSTANCE }} \
            --min-instances=0 \
            --max-instances=2 \
            --memory=512Mi